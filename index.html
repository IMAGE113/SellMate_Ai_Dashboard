<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Order Notebook Pro | SellMate AI</title>
    <style>
        body { background-color: #F5F5F5; }
        .pill-nav { box-shadow: 0 -4px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900 pb-24">

    <!-- Top Dashboard Summary -->
    <header class="bg-[#0D1B2A] text-white p-6 rounded-b-[32px] shadow-lg mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">SellMate AI</h1>
                <p class="text-xs text-slate-400">Order Notebook Pro</p>
            </div>
            <div class="flex gap-3">
                <div class="bg-white/10 p-3 rounded-2xl text-center min-w-[70px]">
                    <p class="text-[10px] text-slate-400 uppercase">Today</p>
                    <p id="total-count" class="font-bold text-emerald-400">0</p>
                </div>
                <div class="bg-white/10 p-3 rounded-2xl text-center min-w-[80px]">
                    <p class="text-[10px] text-slate-400 uppercase">Revenue</p>
                    <p class="font-bold text-white">450K</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <!-- Search & Filter -->
        <div class="relative mb-6">
            <input type="text" placeholder="Search orders..." class="w-full p-4 pl-12 bg-white rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0D1B2A]">
            <svg class="absolute left-4 top-4 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <div class="flex gap-2 overflow-x-auto mb-6 no-scrollbar">
            <button class="px-5 py-2 bg-[#0D1B2A] text-white rounded-full text-sm">All</button>
            <button class="px-5 py-2 bg-white text-slate-600 rounded-full text-sm shadow-sm whitespace-nowrap">New (3)</button>
            <button class="px-5 py-2 bg-white text-slate-600 rounded-full text-sm shadow-sm">Shipping</button>
            <button class="px-5 py-2 bg-white text-slate-600 rounded-full text-sm shadow-sm">Delivered</button>
        </div>

        <!-- Order Cards (Notebook Style) -->
        <div id="order-list" class="space-y-4">
            <!-- JavaScript က ဒီထဲကို ကတ်ပြားလေးတွေ ထည့်ပေးမယ် -->
            <div class="text-center py-10 text-slate-400 italic">Orders ဆွဲယူနေပါသည်...</div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fixed bottom-28 right-6 w-14 h-14 bg-[#0D1B2A] text-white rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-all">
        +
    </button>

    <!-- Bottom Pill Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white rounded-full p-2 pill-nav flex justify-around items-center">
        <button class="p-4 bg-[#0D1B2A] text-white rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
        </button>
        <button class="p-4 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <button class="p-4 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </button>
    </nav>

    <script>
        const API_URL = 'https://sellmate-ai-dashboard-backend.onrender.com';
        const TENANT_ID = 1;

        document.addEventListener('DOMContentLoaded', fetchOrders);

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_URL}/orders?tenant_id=${TENANT_ID}`);
                const orders = await response.json();
                renderOrders(orders);
                document.getElementById('total-count').innerText = orders.length;
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function renderOrders(orders) {
            const orderList = document.getElementById('order-list');
            orderList.innerHTML = orders.map(order => `
                <div class="bg-white rounded-2xl shadow-sm border-l-4 overflow-hidden" style="border-color: ${getStatusColor(order.status)}">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-bold text-lg">${order.customer_name}</h3>
                                <p class="text-xs text-slate-400">${order.phone}</p>
                            </div>
                            <span class="text-lg font-extrabold text-[#0D1B2A]">${Number(order.total_price).toLocaleString()} Ks</span>
                        </div>
                        <p class="text-sm text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl">${order.items}</p>
                        <div class="flex justify-between items-center text-[11px]">
                            <span class="text-slate-400 italic">📍 ${order.address}</span>
                            <span class="px-3 py-1 rounded-full font-bold uppercase" style="background-color: ${getStatusColor(order.status)}20; color: ${getStatusColor(order.status)}">
                                ${order.status}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = { 'pending': '#FBBF24', 'confirmed': '#10B981', 'delivered': '#3B82F6', 'cancelled': '#EF4444' };
            return colors[status] || '#10B981';
        }
    </script>
</body>
</html>
