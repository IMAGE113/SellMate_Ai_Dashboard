<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellMate AI | Intelligent Sales Assistant</title>
    <!-- Spline Viewer Script (ဒါက Robot ကို အသက်သွင်းပေးမှာပါ) -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.50/build/spline-viewer.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 3D Robot နေရာချခြင်း */
        spline-viewer {
            width: 100%;
            height: 100%;
        }

        /* UI Overlay - စာသားနဲ့ ခလုတ်များ */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Robot ကို Mouse နဲ့ ကိုင်လို့ရအောင် */
            display: flex;
            flex-direction: column;
            padding: 50px;
            box-sizing: border-box;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto; /* Nav ကိုတော့ နှိပ်လို့ရအောင် */
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -1px;
        }

        .btn-start {
            background: #6366f1;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: 0.3s ease;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            background: #4f46e5;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🤖 ခင်ဗျားရဲ့ Spline Bot ကို ဒီမှာ ထည့်ထားပါတယ် -->
        <spline-viewer url="https://prod.spline.design/10vjLux-4sfZPdcD/scene.splinecode"></spline-viewer>

        <!-- ရှေ့က UI လွှာ -->
        <div class="content">
            <div class="nav">
                <div class="logo">SellMate AI</div>
                <a href="#" class="btn-start">Launch Dashboard</a>
            </div>
            
            <div style="margin-top: auto; color: #94a3b8; font-size: 14px; pointer-events: auto;">
                Built with Vision by Founder. © 2026
            </div>
        </div>
    </div>

</body>
</html>
