<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Order Notebook Pro | SellMate AI</title>
    <style>
        body { background-color: #F5F5F5; }
        .pill-nav { box-shadow: 0 -4px 20px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 pb-32">

    <!-- Top Dashboard Summary -->
    <header class="bg-[#0D1B2A] text-white p-6 rounded-b-[32px] shadow-lg mb-6 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">SellMate AI</h1>
                <p class="text-xs text-slate-400 font-light">Order Notebook Pro</p>
            </div>
            <div class="flex gap-3">
                <div class="bg-white/10 p-3 rounded-2xl text-center min-w-[70px] backdrop-blur-sm">
                    <p class="text-[10px] text-slate-400 uppercase">Today</p>
                    <p id="total-count" class="font-bold text-emerald-400 text-lg">0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <!-- Search -->
        <div class="relative mb-6">
            <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="Search customer or phone..." class="w-full p-4 pl-12 bg-white rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0D1B2A] transition-all">
            <svg class="absolute left-4 top-4 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <!-- Filter Chips -->
        <div class="flex gap-2 overflow-x-auto mb-6 no-scrollbar pb-2">
            <button onclick="filterOrders('all')" class="filter-btn px-6 py-2 bg-[#0D1B2A] text-white rounded-full text-sm font-medium shadow-md transition-all active:scale-95">All</button>
            <button onclick="filterOrders('pending')" class="filter-btn px-6 py-2 bg-white text-slate-600 rounded-full text-sm font-medium shadow-sm active:scale-95">Pending</button>
            <button onclick="filterOrders('confirmed')" class="filter-btn px-6 py-2 bg-white text-slate-600 rounded-full text-sm font-medium shadow-sm active:scale-95">Confirmed</button>
            <button onclick="filterOrders('delivered')" class="filter-btn px-6 py-2 bg-white text-slate-600 rounded-full text-sm font-medium shadow-sm active:scale-95">Delivered</button>
        </div>

        <!-- Order Cards -->
        <div id="order-list" class="space-y-4">
            <div class="text-center py-10 text-slate-400 italic font-light">Orders ဆွဲယူနေပါသည်...</div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button onclick="alert('Order အသစ်တင်သည့် Form လာပါမည်...')" class="fixed bottom-28 right-6 w-14 h-14 bg-[#0D1B2A] text-white rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-all z-20">
        +
    </button>

    <!-- Bottom Pill Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white rounded-full p-2 pill-nav flex justify-around items-center z-20 border border-slate-100">
        <button class="p-4 bg-[#0D1B2A] text-white rounded-full shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
        </button>
        <button class="p-4 text-slate-400 hover:text-[#0D1B2A]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <button class="p-4 text-slate-400 hover:text-[#0D1B2A]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </button>
    </nav>

    <script>
        const API_URL = 'https://sellmate-ai-dashboard-backend.onrender.com';
        const TENANT_ID = 1;
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', fetchOrders);

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_URL}/orders?tenant_id=${TENANT_ID}`);
                allOrders = await response.json();
                renderOrders(allOrders);
                document.getElementById('total-count').innerText = allOrders.length;
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('order-list').innerHTML = `<div class="text-red-400 text-center py-10">Error connecting to server.</div>`;
            }
        }

        function renderOrders(orders) {
            const orderList = document.getElementById('order-list');
            if (orders.length === 0) {
                orderList.innerHTML = '<div class="text-center py-10 text-slate-400 italic font-light font-myanmar">အော်ဒါ မရှိသေးပါ။</div>';
                return;
            }

            orderList.innerHTML = orders.map(order => `
                <div class="bg-white rounded-3xl shadow-sm border-l-[6px] overflow-hidden transition-all hover:shadow-md" style="border-color: ${getStatusColor(order.status)}">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800">${order.customer_name}</h3>
                                <p class="text-xs text-slate-400">${order.phone}</p>
                            </div>
                            <span class="text-lg font-extrabold text-[#0D1B2A]">${Number(order.total_price).toLocaleString()} Ks</span>
                        </div>
                        <div class="text-sm text-slate-600 mb-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 font-medium">
                            ${order.items}
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-2">
                                <a href="tel:${order.phone}" class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl active:scale-90 transition-all border border-emerald-100">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                </a>
                                ${order.status !== 'delivered' ? `
                                    <button onclick="updateStatus(${order.id}, 'delivered')" class="px-5 py-2 bg-[#0D1B2A] text-white text-xs rounded-2xl font-bold active:scale-95 shadow-sm">
                                        Done
                                    </button>
                                ` : ''}
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 mb-1 font-light italic">📍 ${order.address}</p>
                                <span class="px-4 py-1.5 rounded-xl font-bold uppercase text-[10px] tracking-wider" style="background-color: ${getStatusColor(order.status)}20; color: ${getStatusColor(order.status)}">
                                    ${order.status}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            try {
                // Dashboard Backend မှာ Update status လုပ်မယ့် endpoint လိုအပ်ပါမယ်
                alert('Status ကို ' + newStatus + ' သို့ ပြောင်းလဲပါမည်။ (Backend logic ချိတ်ရန်လိုအပ်)');
                // ယာယီအားဖြင့် UI မှာတင် ပြောင်းပြခြင်း
                allOrders = allOrders.map(o => o.id === orderId ? {...o, status: newStatus} : o);
                renderOrders(allOrders);
            } catch (error) {
                console.error("Update error:", error);
            }
        }

        function filterOrders(status) {
            // UI Button Toggle
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.replace('bg-[#0D1B2A]', 'bg-white');
                btn.classList.replace('text-white', 'text-slate-600');
            });
            event.target.classList.replace('bg-white', 'bg-[#0D1B2A]');
            event.target.classList.replace('text-slate-600', 'text-white');

            if (status === 'all') {
                renderOrders(allOrders);
            } else {
                const filtered = allOrders.filter(o => o.status === status);
                renderOrders(filtered);
            }
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allOrders.filter(o => 
                o.customer_name.toLowerCase().includes(query) || 
                o.phone.includes(query)
            );
            renderOrders(filtered);
        }

        function getStatusColor(status) {
            const colors = { 'pending': '#FBBF24', 'confirmed': '#10B981', 'delivered': '#3B82F6', 'cancelled': '#EF4444' };
            return colors[status] || '#10B981';
        }
    </script>
</body>
</html>
