<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellMate AI | Your Smart Sales Assistant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Scroll မဖြစ်အောင် */
            background-color: #f0f2f5; /* ခင်ဗျား Design နဲ့ လိုက်မယ့် အရောင် */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Spline Bot ကို Background အနေနဲ့ ထားတာ */
        .spline-viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* အပေါ်က စာသားနဲ့ UI အပိုင်း */
        .overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Bot ကို ထိလို့ရအောင် စာသားလွှာကို ဖြတ်သွားခိုင်းတာ */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .cta-button {
            background-color: #6366f1;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- Spline Bot Embedding -->
        <iframe src="https://my.spline.design/r4xbot-n5HbgkSkdJQsrMy0EHMOcile/" 
                frameborder="0" 
                width="100%" 
                height="100%" 
                class="spline-viewer">
        </iframe>

        <!-- Overlay UI Elements -->
        <div class="overlay-ui">
            <div class="nav-bar">
                <div class="logo">SellMate AI</div>
                <a href="#" class="cta-button">Get Started</a>
            </div>

            <!-- အောက်ခြေမှာ တစ်ခုခု ထည့်ချင်ရင် ဒီမှာ ထည့်လို့ရတယ် -->
            <div style="color: #666; font-size: 14px;">
                © 2026 SellMate AI. Powered by Spline & Founder's Vision.
            </div>
        </div>
    </div>

</body>
</html>
