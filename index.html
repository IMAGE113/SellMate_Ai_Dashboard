<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SellMate AI | Admin Dashboard</title>
</head>
<body class="bg-slate-900 text-slate-100 p-4">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <div>
                <h1 class="text-2xl font-bold text-emerald-400">SellMate AI Console</h1>
                <p class="text-sm text-slate-400">Monitoring: sellmate-ai.shop</p>
            </div>
            <div class="text-right">
                <span class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs rounded-full border border-emerald-500/20">System Live</span>
            </div>
        </header>

        <!-- Stats Section -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                <p class="text-slate-500 text-xs uppercase">Total Orders</p>
                <p class="text-xl font-bold">1</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center text-yellow-400">
                <p class="text-slate-500 text-xs uppercase">Pending</p>
                <p class="text-xl font-bold">1</p>
            </div>
        </div>

        <!-- Order List Section -->
        <h2 class="text-lg font-bold mb-4 text-slate-300 px-2">📦 Current Orders</h2>
        
        <div id="order-list" class="space-y-4">
            <!-- Order Card -->
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-lg">
                <div class="p-5 flex justify-between items-start border-b border-slate-700/50">
                    <div>
                        <h3 class="font-bold text-lg text-slate-100">Customer: မောင်မောင်</h3>
                        <p class="text-sm text-slate-400">📞 09-123456789</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-500 mb-1 font-mono uppercase">Order Status</p>
                        <select onchange="updateStatus(this)" class="bg-slate-900 text-xs border border-slate-600 rounded-lg px-3 py-1.5 text-emerald-400 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                            <option value="pending" selected>🟡 Pending</option>
                            <option value="confirmed">🟢 Confirmed</option>
                            <option value="delivered">🔵 Delivered</option>
                            <option value="cancelled">🔴 Cancelled</option>
                        </select>
                    </div>
                </div>
                
                <div class="p-5">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-medium text-slate-400">Order Summary:</span>
                        <span class="text-lg font-bold text-emerald-400">45,000 MMK</span>
                    </div>
                    <div class="p-4 bg-slate-900/80 rounded-xl border border-slate-700/50 text-sm leading-relaxed text-slate-300">
                        • အနွေးထည် (အနက်) - ၁ ထည် <br>
                        • တီရှပ် (အဖြူ) - ၂ ထည် <br>
                        <hr class="my-2 border-slate-700">
                        <span class="text-xs text-slate-500 italic">Address: လှိုင်မြို့နယ်၊ ရန်ကုန်။</span>
                    </div>
                </div>

                <div class="p-4 bg-slate-800/50 flex gap-3">
                    <button onclick="confirmAction()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm font-bold shadow-lg shadow-emerald-900/20 transition-all active:scale-95">
                        CONFIRM & SEND NOTIFICATION
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
